<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>의학용어 퀴즈</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap');
  :root {
    --bg:#0d1117; --card:#161b22; --border:#21262d;
    --accent:#58a6ff; --accent2:#79c0ff;
    --text:#e6edf3; --muted:#8b949e;
    --correct:#3fb950; --wrong:#f85149;
    --tag-bg:rgba(31,111,235,0.18); --tag:#79c0ff;
    --safe-top:env(safe-area-inset-top,0px);
    --safe-bottom:env(safe-area-inset-bottom,0px);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;overflow:hidden}
  body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column}

  .header{flex-shrink:0;background:linear-gradient(160deg,#0d1f3c,#0d1117);padding:calc(var(--safe-top) + 14px) 16px 12px;border-bottom:1px solid var(--border)}
  .header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
  .header h1{font-size:1.1rem;font-weight:900}
  .header h1 span{color:var(--accent2)}
  .score-pill{background:var(--card);border:1px solid var(--border);border-radius:99px;padding:4px 12px;font-size:0.78rem;color:var(--correct);font-weight:700}
  .progress-wrap{display:flex;align-items:center;gap:8px}
  .progress-bar-bg{flex:1;height:5px;background:var(--border);border-radius:99px}
  .progress-bar{height:5px;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:99px;transition:width 0.35s;width:0%}
  .progress-label{font-size:0.7rem;color:var(--muted);white-space:nowrap;min-width:48px;text-align:right}

  .tabs-wrap{flex-shrink:0;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;display:flex;gap:6px;padding:10px 14px;background:var(--bg);border-bottom:1px solid var(--border)}
  .tabs-wrap::-webkit-scrollbar{display:none}
  .tab-btn{flex-shrink:0;padding:6px 14px;border-radius:99px;border:1px solid var(--border);background:var(--card);color:var(--muted);font-size:0.73rem;font-family:inherit;font-weight:500;cursor:pointer;white-space:nowrap}
  .tab-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:700}

  .mode-bar{flex-shrink:0;display:flex;gap:6px;padding:10px 14px;background:var(--bg);border-bottom:1px solid var(--border)}
  .mode-btn{flex:1;padding:8px;border-radius:10px;border:1.5px solid var(--border);background:var(--card);color:var(--muted);font-size:0.78rem;font-family:inherit;font-weight:500;cursor:pointer}
  .mode-btn.active{border-color:var(--accent);background:rgba(88,166,255,0.12);color:var(--accent2);font-weight:700}

  .scroll-area{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 14px calc(var(--safe-bottom) + 76px)}

  .q-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:18px 16px 16px;margin-bottom:12px}
  .q-meta{font-size:0.67rem;font-weight:700;color:var(--accent);letter-spacing:0.8px;text-transform:uppercase;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center}
  .q-tag{background:var(--tag-bg);color:var(--tag);border-radius:4px;padding:1px 6px;font-size:0.64rem;font-weight:600}
  .q-text{font-size:0.93rem;font-weight:500;line-height:1.65;margin-bottom:14px;word-break:keep-all;white-space:pre-wrap}

  .options{display:flex;flex-direction:column;gap:7px}
  .opt-btn{display:flex;align-items:center;gap:10px;width:100%;padding:12px 13px;border-radius:11px;border:1.5px solid var(--border);background:rgba(255,255,255,0.03);color:var(--text);font-size:0.87rem;font-family:inherit;font-weight:400;text-align:left;cursor:pointer;line-height:1.5;word-break:keep-all}
  .opt-btn:active:not(:disabled){background:#1e3a5f;border-color:var(--accent)}
  .badge{flex-shrink:0;width:28px;height:28px;border-radius:50%;background:var(--border);display:flex;align-items:center;justify-content:center;font-size:0.8rem;font-weight:700}
  .opt-btn.correct{border-color:var(--correct);background:rgba(63,185,80,0.1)}
  .opt-btn.correct .badge{background:var(--correct);color:#fff}
  .opt-btn.wrong{border-color:var(--wrong);background:rgba(248,81,73,0.1)}
  .opt-btn.wrong .badge{background:var(--wrong);color:#fff}
  .opt-btn:disabled{cursor:default}

  .type-wrap{display:flex;gap:8px;margin-top:4px}
  .type-input{flex:1;padding:11px 13px;border-radius:11px;border:1.5px solid var(--border);background:rgba(255,255,255,0.04);color:var(--text);font-size:0.9rem;font-family:inherit;outline:none}
  .type-input:focus{border-color:var(--accent)}
  .type-btn{padding:11px 16px;border-radius:11px;background:var(--accent);color:#fff;border:none;font-family:inherit;font-size:0.85rem;font-weight:700;cursor:pointer;white-space:nowrap}
  .type-ans{margin-top:6px;font-size:0.8rem;color:var(--correct)}

  .exp-box{display:none;margin-top:11px;padding:10px 13px;border-radius:10px;background:rgba(88,166,255,0.07);border-left:3px solid var(--accent);font-size:0.8rem;color:#79c0ff;line-height:1.65;word-break:keep-all}
  .exp-box.show{display:block;animation:fadeIn 0.2s ease}
  @keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

  .bottom-bar{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--border);padding:10px 16px calc(var(--safe-bottom) + 10px);display:flex;gap:8px;z-index:200}
  .btn-result{flex:1;padding:14px;border-radius:12px;background:var(--accent);color:#fff;border:none;font-family:inherit;font-size:0.9rem;font-weight:700;cursor:pointer}
  .btn-retry{padding:14px 16px;border-radius:12px;background:transparent;color:var(--muted);border:1.5px solid var(--border);font-family:inherit;font-size:0.85rem;font-weight:500;cursor:pointer;white-space:nowrap}

  .score-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px 120px;text-align:center;min-height:60vh}
  .score-ring{width:130px;height:130px;border-radius:50%;border:4px solid var(--accent);display:flex;flex-direction:column;align-items:center;justify-content:center;margin-bottom:22px;background:linear-gradient(135deg,#0d1f3c,#0d1117);box-shadow:0 0 40px rgba(88,166,255,0.2)}
  .score-big{font-size:2.2rem;font-weight:900;color:var(--accent2);line-height:1}
  .score-of{font-size:0.7rem;color:var(--muted);margin-top:3px}
  .score-emoji{font-size:1.8rem;margin-bottom:6px}
  .score-title{font-size:1.1rem;font-weight:700;margin-bottom:6px}
  .score-sub{font-size:0.82rem;color:var(--muted)}
</style>
</head>
<body>
<div class="header">
  <div class="header-top">
    <h1>🩺 의학용어 <span>퀴즈</span></h1>
    <div class="score-pill">✓ <span id="correctCount">0</span>개</div>
  </div>
  <div class="progress-wrap">
    <div class="progress-bar-bg"><div class="progress-bar" id="pbar"></div></div>
    <div class="progress-label" id="plabel">0 / 0</div>
  </div>
</div>
<div class="tabs-wrap" id="tabsWrap"></div>
<div class="mode-bar">
  <button class="mode-btn active" id="modeChoice" onclick="setMode('choice')">🔤 객관식</button>
  <button class="mode-btn" id="modeType" onclick="setMode('type')">✏️ 직접 입력</button>
</div>
<div class="scroll-area" id="scrollArea"></div>
<div class="bottom-bar">
  <button class="btn-retry" onclick="retry()">↺ 다시</button>
  <button class="btn-result" onclick="showScore()">결과 보기 →</button>
</div>

<script>
const D = {

/* ────────────────────────────────────────────
   Ch.1  기본 접미사 (p.1)
──────────────────────────────────────────── */
"Ch.1 기본접미사": { questions: [
  {q:"-itis 의 의미는?", opts:["염증","통증","종양","절개"], ans:0, exp:"-itis = 염증 (예: Appendicitis 충수염, Arthritis 관절염)", tag:"접미사"},
  {q:"-algia 의 의미는?", opts:["염증","통증","분비","부종"], ans:1, exp:"-algia = 통증 (예: Neuralgia 신경통, Cardialgia 심장통)", tag:"접미사"},
  {q:"-dynia 의 의미는?", opts:["염증","종양","통증","경련"], ans:2, exp:"-dynia = 통증 (-algia와 동의어, 예: Pleurodynia)", tag:"접미사"},
  {q:"-pathy 의 의미는?", opts:["절제","질병·장애","성형","출혈"], ans:1, exp:"-pathy = 질병·장애 (예: Arthropathy 관절병증, Neuropathy 신경병증)", tag:"접미사"},
  {q:"-oma 의 의미는?", opts:["통증","염증","종양·살점","절개"], ans:2, exp:"-oma = 종양·살점 (예: Sarcoma 육종, Adenoma 선종)", tag:"접미사"},
  {q:"-osis 의 의미는?", opts:["절제","염증","수술","비정상적 상태·과정"], ans:3, exp:"-osis = 비정상적 상태·과정 (예: Fibrosis 섬유증, Stenosis 협착)", tag:"접미사"},
  {q:"-megaly 의 의미는?", opts:["감소","비대(커짐)","절제","경화"], ans:1, exp:"-megaly = 장기가 커진 상태 (예: Cardiomegaly 심장비대, Splenomegaly 비장비대)", tag:"접미사"},
  {q:"-ectasis 의 의미는?", opts:["수축·축소","확장·팽창","염증","절개"], ans:1, exp:"-ectasis = 확장·팽창 (예: Bronchiectasis 기관지확장증, Atelectasis 무기폐)", tag:"접미사"},
  {q:"-stasis 의 의미는?", opts:["증가","정지·억제","절개","용해"], ans:1, exp:"-stasis = 정지·억제 (예: Hemostasis 지혈, Bacteriostasis 세균 정지)", tag:"접미사"},
  {q:"-cide 의 의미는?", opts:["치료","죽이다·살균","성형","검사"], ans:1, exp:"-cide = 죽이다 (예: Bactericide 살균제, Pesticide 살충제)", tag:"접미사"},
  {q:"-clasis 의 의미는?", opts:["절개","파괴·분쇄","생성","감소"], ans:1, exp:"-clasis = 파괴·분쇄 (예: Osteoclasis 뼈 분쇄)", tag:"접미사"},
  {q:"-lysis 의 의미는?", opts:["생성","파괴·분리·용해","염증","수술"], ans:1, exp:"-lysis = 파괴·분리 (예: Hemolysis 용혈, Paralysis 마비)", tag:"접미사"},
  {q:"-rrhexis 의 의미는?", opts:["분비","파열·터짐","절개","팽창"], ans:1, exp:"-rrhexis = 파열·터짐 (예: Cardiorrhexis 심장파열)", tag:"접미사"},
  {q:"-rrhea 의 의미는?", opts:["분리","흐름·분비","통증","굳음"], ans:1, exp:"-rrhea = 흐름·분비 (예: Diarrhea 설사, Rhinorrhea 콧물)", tag:"접미사"},
  {q:"-rrhagia 의 의미는?", opts:["정상 분비","비정상 과다출혈","흐름 정지","염증"], ans:1, exp:"-rrhagia = 과다·비정상 출혈 (예: Menorrhagia 과다월경, Hemorrhagia 출혈)", tag:"접미사"},
  {q:"-cyte 의 의미는?", opts:["조직","세포","기관","효소"], ans:1, exp:"-cyte = 세포 (예: Erythrocyte 적혈구, Leukocyte 백혈구)", tag:"접미사"},
  {q:"-blast 의 의미는?", opts:["성숙 세포","배아·발달 단계의 미성숙 세포","죽은 세포","이식 세포"], ans:1, exp:"-blast = 미성숙·배아 세포 (예: Osteoblast 조골세포, Fibroblast 섬유모세포)", tag:"접미사"},
  {q:"-plaisa (의 의미)는?", opts:["절제","세포 형성·발달","수축","분비"], ans:1, exp:"-plasia = 세포 형성·발달 (예: Hyperplasia 세포과증식, Dysplasia 이형성)", tag:"접미사"},
  {q:"-gen 의 의미는?", opts:["분해","생산·기원하는 것","흡수","운반"], ans:1, exp:"-gen = 생산하는 것 (예: Pathogen 병원체, Carcinogen 발암물질)", tag:"접미사"},
  {q:"-logy 의 의미는?", opts:["치료","연구하는 분야·학문","성형","절개"], ans:1, exp:"-logy = 연구하는 분야 (예: Cardiology 심장학, Pathology 병리학)", tag:"접미사"},
  {q:"-logist 의 의미는?", opts:["진단 장비","전문의","수술 절차","치료 약물"], ans:1, exp:"-logist = 전문의 (예: Cardiologist 심장전문의, Dermatologist 피부과전문의)", tag:"접미사"},
  {q:"-iatric 의 의미는?", opts:["검사","의학적 치료·의사","수술","연구"], ans:1, exp:"-iatric = 의학·치료 (예: Pediatric 소아과의, Psychiatric 정신과의)", tag:"접미사"},
  {q:"-ist 의 의미는?", opts:["기관","전문가·사람","질환","과정"], ans:1, exp:"-ist = 전문가·사람 (예: Specialist, Physiotherapist)", tag:"접미사"},
  {q:"-emia 의 의미는?", opts:["소변 상태","혈액 상태","조직 상태","림프 상태"], ans:1, exp:"-emia = 혈액 상태 (예: Anemia 빈혈, Hyperglycemia 고혈당)", tag:"접미사"},
  {q:"-uria 의 의미는?", opts:["혈액 상태","소변 상태","호흡 상태","분비 상태"], ans:1, exp:"-uria = 소변 상태 (예: Hematuria 혈뇨, Glycosuria 당뇨)", tag:"접미사"},
  {q:"-penia 의 의미는?", opts:["과다·증가","감소·결핍","염증","종양"], ans:1, exp:"-penia = 감소·결핍 (예: Leukopenia 백혈구감소, Thrombocytopenia 혈소판감소)", tag:"접미사"},
  {q:"-gravida 의 의미는?", opts:["출산 경험","임신 상태","수유 중","폐경 후"], ans:1, exp:"-gravida = 임신 상태 (예: Primigravida 초임부, Multigravida 경산부)", tag:"접미사"},
  {q:"-phobia 의 의미는?", opts:["좋아하는 것","이상하게 생긴 것","두려움","학문"], ans:2, exp:"-phobia = 두려움 (예: Claustrophobia 밀폐공포증, Hydrophobia 물공포증)", tag:"접미사"},
  {q:"-philia 의 의미는?", opts:["공포","좋아하거나 잘 결합하는 성질","억제","감소"], ans:1, exp:"-philia = 좋아함·친화성 (예: Hemophilia 혈우병, Eosinophilia 호산구증가)", tag:"접미사"},
  {q:"-plegia 의 의미는?", opts:["통증","경련","마비","부종"], ans:2, exp:"-plegia = 마비 (예: Paraplegia 하반신마비, Hemiplegia 반신마비)", tag:"접미사"},
  {q:"-lith 의 의미는?", opts:["경련","결석·돌","출혈","괴사"], ans:1, exp:"-lith = 결석·돌 (예: Cholelithiasis 담석증, Urolithiasis 요로결석)", tag:"접미사"},
  {q:"-lithiasis 의 의미는?", opts:["결석이 없는 상태","결석 형성 상태","조직 경화","감염"], ans:1, exp:"-lithiasis = 결석 형성 상태 (예: Cholelithiasis 담석증)", tag:"접미사"},
  {q:"-pnea 의 의미는?", opts:["삼킴","호흡","소화","배설"], ans:1, exp:"-pnea = 호흡 (예: Apnea 무호흡, Dyspnea 호흡곤란, Tachypnea 빈호흡)", tag:"접미사"},
  {q:"-ptosis 의 의미는?", opts:["확장","이완·하수·처짐","비대","강직"], ans:1, exp:"-ptosis = 이완·하수 (예: Blepharoptosis 안검하수, Nephroptosis 신장하수)", tag:"접미사"},
]},

/* ────────────────────────────────────────────
   Ch.2  접두사 (p.2)
──────────────────────────────────────────── */
"Ch.2 접두사": { questions: [
  {q:"접두사 'e / ex / exo-' 의 의미는?", opts:["안으로","밖으로(out)","위에","사이에"], ans:1, exp:"e/ex/exo- = 밖으로 (예: Excision 절제, Exocrine 외분비)", tag:"접두사"},
  {q:"접두사 'extra-' 의 의미는?", opts:["안에","바깥·외부","아래","앞에"], ans:1, exp:"extra- = 바깥 (예: Extracellular 세포외, Extrauterine 자궁외)", tag:"접두사"},
  {q:"접두사 'in-' 의 의미는?", opts:["위에","안에(in)","뒤에","곁에"], ans:1, exp:"in- = 안에 (예: Injection 주사, Intravenous 정맥내)", tag:"접두사"},
  {q:"접두사 'sub-' 의 의미는?", opts:["위에","아래에","사이에","반대"], ans:1, exp:"sub- = 아래에 (예: Subcutaneous 피하, Sublingual 설하)", tag:"접두사"},
  {q:"접두사 'inter-' 의 의미는?", opts:["위에","아래에","사이에","밖에"], ans:2, exp:"inter- = 사이에 (예: Intercostal 늑간, International 국가 간)", tag:"접두사"},
  {q:"접두사 'intra-' 의 의미는?", opts:["바깥","사이에","안에(내부)","위에"], ans:2, exp:"intra- = 안에·내부 (예: Intravenous 정맥내, Intracranial 두개내)", tag:"접두사"},
  {q:"접두사 'juxta-' 의 의미는?", opts:["반대","근접·옆에 있는","위에","안에"], ans:1, exp:"juxta- = 근접·바로 옆 (예: Juxtaglomerular 사구체 옆)", tag:"접두사"},

  {q:"CXR의 의미는?", opts:["Cardiac X-Ray","Chest X-Ray(흉부 X선)","Cervical X-Ray","Cranial X-Ray"], ans:1, exp:"CXR = Chest X-Ray = 흉부 X선 촬영. 가장 기본적이고 경제적인 흉부 영상 검사", tag:"약어"},
  {q:"ERV의 의미는?", opts:["Expiratory Reserve Volume(호기예비량)","Elastic Respiratory Volume","External Rotation Volume","Erythrocyte Reserve Volume"], ans:0, exp:"ERV = Expiratory Reserve Volume = 호기예비량. 평상 호기 후 더 내쉴 수 있는 양", tag:"폐기능"},
  {q:"IRV의 의미는?", opts:["Inspiratory Reserve Volume(흡기예비량)","Internal Rotation Volume","Immune Response Variant","Inspiratory Residual Ventilation"], ans:0, exp:"IRV = Inspiratory Reserve Volume = 흡기예비량. 평상 흡기 후 더 들이마실 수 있는 양", tag:"폐기능"},
  {q:"O2의 의미는?", opts:["이산화탄소","산소(Oxygen)","질소","수소"], ans:1, exp:"O₂ = Oxygen = 산소. 세포 호흡의 필수 물질", tag:"약어"},
  {q:"PA 흉부 X선의 의미는?", opts:["전후방향","후전방향(Posteroanterior)","측면 방향","사선 방향"], ans:1, exp:"PA = Posteroanterior = 후전방향. X선이 뒤→앞으로 투과. 표준 흉부 X선 촬영 방법", tag:"약어"},
  {q:"CPR의 의미는?", opts:["Cardiac Pressure Rate","Cardiopulmonary Resuscitation(심폐소생술)","Chronic Pulmonary Reaction","Cerebral Pulse Rate"], ans:1, exp:"CPR = Cardiopulmonary Resuscitation = 심폐소생술. 심정지 시 응급처치", tag:"약어"},
  {q:"PFT의 의미는?", opts:["Peripheral Function Test","Pulmonary Function Test(폐기능검사)","Plasma Fibrin Test","Pericardial Fluid Test"], ans:1, exp:"PFT = Pulmonary Function Test = 폐기능검사. 폐활량·기류 등 폐 기능 평가", tag:"폐기능"},
  {q:"RV (폐기능)의 의미는?", opts:["Respiratory Velocity","Residual Volume(잔기량)","Right Ventricle","Resting Volume"], ans:1, exp:"RV = Residual Volume = 잔기량. 최대 호기 후에도 폐에 남아있는 공기량", tag:"폐기능"},
  {q:"SOB의 의미는?", opts:["Sound of Breathing","Shortness of Breath(호흡곤란)","Severity of Bronchitis","State of Blood"], ans:1, exp:"SOB = Shortness of Breath = 호흡곤란. Dyspnea와 동의어", tag:"약어"},
  {q:"SOA의 의미는?", opts:["Shortness of Air(호흡곤란)","Sound of Airway","State of Oxygen","Severity of Asthma"], ans:0, exp:"SOA = Shortness of Air = 공기 부족감·호흡 곤란", tag:"약어"},
  {q:"T&A의 의미는?", opts:["Tonsillectomy & Adenoidectomy(편도·아데노이드 절제술)","Thorax & Abdomen","Trachea & Artery","Tidal & Airway"], ans:0, exp:"T&A = Tonsillectomy & Adenoidectomy = 편도 및 아데노이드 절제술", tag:"약어"},
  {q:"TV (폐기능)의 의미는?", opts:["Tracheal Volume","Tidal Volume(1회 호흡량)","Total Ventilation","Thoracic Volume"], ans:1, exp:"TV = Tidal Volume = 1회 호흡량. 평상 호흡 시 1회에 들이쉬고 내쉬는 공기량(약 500mL)", tag:"폐기능"},
  {q:"URI의 의미는?", opts:["Upper Respiratory Infection(상기도감염)","Urinary Retention Index","Urethral Imaging","Upper Rib Injury"], ans:0, exp:"URI = Upper Respiratory Infection = 상기도감염. 일반 감기 포함", tag:"약어"},
  {q:"URT의 의미는?", opts:["Upper Respiratory Tract(상기도)","Urinary Retention Test","Upper Rib Trauma","Ultrasound Respiratory Test"], ans:0, exp:"URT = Upper Respiratory Tract = 상기도. 코~후두까지", tag:"약어"},
  // 호흡 의학 용어
  {q:"Diaphragm 의 의미는?", opts:["갈비뼈","횡격막(호흡 주 근육)","흉막","심장막"], ans:1, exp:"Diaphragm = 횡격막. 흉강과 복강을 나누는 가장 중요한 호흡 근육", tag:"폐구조"},
  {q:"Mucolytic 의 의미는?", opts:["기관지 확장제","거담제(점액 용해)","기관지 수축제","항히스타민제"], ans:1, exp:"Muco(점액)+lytic(용해) = 거담제. 가래를 묽게 하여 배출", tag:"약물"},
  {q:"Tonsillectomy 의 의미는?", opts:["아데노이드 절제술","편도 절제술","후두 절제술","기관 절제술"], ans:1, exp:"Tonsill(편도)+ectomy(절제) = 편도 절제술", tag:"수술"},
  {q:"Adenoidectomy 의 의미는?", opts:["편도 절제술","아데노이드 절제술","후두 절제술","기관 절제술"], ans:1, exp:"Adenoid+ectomy = 아데노이드 절제술", tag:"수술"},
  {q:"Pulmonary angiography 의 의미는?", opts:["폐 생검","폐기능검사","폐혈관조영술","흉부 CT"], ans:2, exp:"Pulmonary(폐)+angiography(혈관조영술) = 폐혈관조영술. 폐동맥에 조영제 주입", tag:"검사"},
  {q:"Bronchoconstriction 의 의미는?", opts:["기관지 확장","기관지 수축(천식 발작 시)","기관지 염증","기관지 감염"], ans:1, exp:"Broncho(기관지)+constriction(수축) = 기관지수축. 천식 등에서 나타남", tag:"폐질환"},
  {q:"Sphyxia / Asphyxia 의 의미는?", opts:["정상 호흡","질식(산소 부족+CO₂ 과다)","과호흡","서호흡"], ans:1, exp:"Asphyxia = 질식. 산소 공급이 안 되고 CO₂가 축적되는 상태", tag:"호흡증상"},
]},

};  // end of D

const chapters = Object.keys(D);
let curCh = chapters[0];
let answered = {};
let correctCount = 0;
let quizMode = 'choice';

function buildTabs() {
  const wrap = document.getElementById('tabsWrap');
  chapters.forEach(ch => {
    const btn = document.createElement('button');
    btn.className = 'tab-btn' + (ch===curCh?' active':'');
    btn.textContent = ch;
    btn.onclick = () => switchChapter(ch);
    wrap.appendChild(btn);
  });
}

function setMode(m) {
  quizMode = m;
  document.getElementById('modeChoice').classList.toggle('active', m==='choice');
  document.getElementById('modeType').classList.toggle('active', m==='type');
  answered={}; correctCount=0;
  document.getElementById('correctCount').textContent='0';
  render();
}

function switchChapter(ch) {
  curCh=ch; answered={}; correctCount=0;
  document.getElementById('correctCount').textContent='0';
  document.querySelectorAll('.tab-btn').forEach((b,i)=>{
    b.classList.toggle('active',chapters[i]===ch);
    if(chapters[i]===ch) b.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
  });
  render();
}

function render() {
  const area = document.getElementById('scrollArea');
  area.scrollTop=0; area.innerHTML='';
  const qs = D[curCh].questions;
  qs.forEach((q,qi)=>{
    const card = document.createElement('div');
    card.className='q-card';
    const isType = quizMode==='type';
    card.innerHTML=`
      <div class="q-meta">
        <span>${qi+1}/${qs.length}</span>
        <span class="q-tag">${q.tag}</span>
      </div>
      <div class="q-text">${q.q}</div>
      ${isType?`
        <div class="type-wrap">
          <input class="type-input" id="ti${qi}" placeholder="정답 입력..."
            onkeydown="if(event.key==='Enter')checkType(${qi})"/>
          <button class="type-btn" onclick="checkType(${qi})">확인</button>
        </div>
      `:`
        <div class="options">
          ${q.opts.map((o,oi)=>`
            <button class="opt-btn" ontouchstart="" onclick="pick(${qi},${oi})" id="o${qi}_${oi}">
              <span class="badge">${['①','②','③','④'][oi]}</span>
              <span>${o}</span>
            </button>`).join('')}
        </div>
      `}
      <div class="exp-box" id="exp${qi}">${q.exp}</div>`;
    area.appendChild(card);
  });
  updateProgress();
}

function pick(qi,sel){
  if(answered[qi]!==undefined) return;
  answered[qi]=sel;
  const q=D[curCh].questions[qi];
  if(sel===q.ans){correctCount++;document.getElementById('correctCount').textContent=correctCount;}
  q.opts.forEach((_,oi)=>{
    const btn=document.getElementById(`o${qi}_${oi}`);
    btn.disabled=true;
    if(oi===q.ans) btn.classList.add('correct');
    else if(oi===sel) btn.classList.add('wrong');
  });
  document.getElementById(`exp${qi}`).classList.add('show');
  updateProgress();
}

function checkType(qi){
  if(answered[qi]!==undefined) return;
  const q=D[curCh].questions[qi];
  const input=document.getElementById(`ti${qi}`);
  const val=input.value.trim();
  if(!val) return;
  const correct=q.opts[q.ans];
  const norm=s=>s.replace(/\s|\(.*?\)/g,'').toLowerCase();
  const isOk=norm(val)===norm(correct)||correct.includes(val)||val.includes(correct.split('(')[0].trim());
  answered[qi]=isOk?q.ans:-1;
  input.disabled=true;
  input.style.borderColor=isOk?'var(--correct)':'var(--wrong)';
  input.style.background=isOk?'rgba(63,185,80,0.1)':'rgba(248,81,73,0.1)';
  if(isOk){correctCount++;document.getElementById('correctCount').textContent=correctCount;}
  else{
    const d=document.createElement('div');
    d.className='type-ans';
    d.textContent='✅ 정답: '+correct;
    input.parentNode.after(d);
  }
  document.getElementById(`exp${qi}`).classList.add('show');
  updateProgress();
}

function updateProgress(){
  const total=D[curCh].questions.length;
  const done=Object.keys(answered).length;
  document.getElementById('pbar').style.width=(done/total*100)+'%';
  document.getElementById('plabel').textContent=`${done} / ${total}`;
}

function retry(){
  answered={}; correctCount=0;
  document.getElementById('correctCount').textContent='0';
  render();
}

function showScore(){
  const total=D[curCh].questions.length;
  const pct=Math.round(correctCount/total*100);
  const[emoji,msg]=pct>=90?['🎉','완벽합니다!']:pct>=70?['👍','잘했어요!']:pct>=50?['📚','조금 더 공부해봐요']:['💪','다시 도전해봐요!'];
  document.getElementById('scrollArea').innerHTML=`
    <div class="score-screen">
      <div class="score-ring">
        <div class="score-big">${correctCount}/${total}</div>
        <div class="score-of">정답</div>
      </div>
      <div class="score-emoji">${emoji}</div>
      <div class="score-title">${msg}</div>
      <div class="score-sub">정답률 ${pct}% · ${curCh}</div>
    </div>`;
}

buildTabs(); render();
</script>
</body>
</html>
