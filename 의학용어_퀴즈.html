<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>의학용어 퀴즈</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap');
  :root {
    --bg: #0d1117;
    --card: #161b22;
    --border: #21262d;
    --accent: #58a6ff;
    --accent2: #79c0ff;
    --text: #e6edf3;
    --muted: #8b949e;
    --correct: #3fb950;
    --wrong: #f85149;
    --tag: #1f6feb;
    --safe-top: env(safe-area-inset-top,0px);
    --safe-bottom: env(safe-area-inset-bottom,0px);
  }
  * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
  html, body { height:100%; overflow:hidden; }
  body { font-family:'Noto Sans KR',sans-serif; background:var(--bg); color:var(--text); display:flex; flex-direction:column; }

  /* HEADER */
  .header {
    flex-shrink:0;
    background:linear-gradient(160deg,#0d1f3c 0%,#0d1117 100%);
    padding:calc(var(--safe-top) + 14px) 16px 12px;
    border-bottom:1px solid var(--border);
  }
  .header-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
  .header h1 { font-size:1.1rem; font-weight:900; }
  .header h1 span { color:var(--accent2); }
  .score-pill { background:var(--card); border:1px solid var(--border); border-radius:99px; padding:4px 12px; font-size:0.78rem; color:var(--correct); font-weight:700; }
  .progress-wrap { display:flex; align-items:center; gap:8px; }
  .progress-bar-bg { flex:1; height:5px; background:var(--border); border-radius:99px; }
  .progress-bar { height:5px; background:linear-gradient(90deg,var(--accent),var(--accent2)); border-radius:99px; transition:width 0.35s; width:0%; }
  .progress-label { font-size:0.7rem; color:var(--muted); white-space:nowrap; min-width:48px; text-align:right; }

  /* TABS */
  .tabs-wrap { flex-shrink:0; overflow-x:auto; -webkit-overflow-scrolling:touch; scrollbar-width:none; display:flex; gap:6px; padding:10px 14px; background:var(--bg); border-bottom:1px solid var(--border); }
  .tabs-wrap::-webkit-scrollbar { display:none; }
  .tab-btn { flex-shrink:0; padding:6px 14px; border-radius:99px; border:1px solid var(--border); background:var(--card); color:var(--muted); font-size:0.73rem; font-family:inherit; font-weight:500; cursor:pointer; white-space:nowrap; }
  .tab-btn.active { background:var(--accent); border-color:var(--accent); color:#fff; font-weight:700; }

  /* SCROLL AREA */
  .scroll-area { flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; padding:14px 14px calc(var(--safe-bottom) + 76px); }

  /* QUIZ MODE TOGGLE */
  .mode-toggle { display:flex; gap:6px; padding:0 14px 12px; }
  .mode-btn { flex:1; padding:8px; border-radius:10px; border:1.5px solid var(--border); background:var(--card); color:var(--muted); font-size:0.78rem; font-family:inherit; font-weight:500; cursor:pointer; transition:all 0.15s; }
  .mode-btn.active { border-color:var(--tag); background:rgba(31,111,235,0.15); color:var(--accent2); font-weight:700; }

  /* Q CARD */
  .q-card { background:var(--card); border:1px solid var(--border); border-radius:16px; padding:18px 16px 16px; margin-bottom:12px; }
  .q-meta { font-size:0.67rem; font-weight:700; color:var(--accent); letter-spacing:0.8px; text-transform:uppercase; margin-bottom:6px; display:flex; justify-content:space-between; align-items:center; }
  .q-tag { background:rgba(88,166,255,0.12); color:var(--accent); border-radius:4px; padding:1px 6px; font-size:0.64rem; }
  .q-text { font-size:0.93rem; font-weight:500; line-height:1.65; margin-bottom:14px; word-break:keep-all; }
  .q-hint { font-size:0.75rem; color:var(--muted); margin-bottom:12px; font-style:italic; }
  .options { display:flex; flex-direction:column; gap:7px; }

  /* TYPE QUIZ: input */
  .type-wrap { display:flex; gap:8px; margin-top:4px; }
  .type-input { flex:1; padding:11px 13px; border-radius:11px; border:1.5px solid var(--border); background:rgba(255,255,255,0.04); color:var(--text); font-size:0.9rem; font-family:inherit; outline:none; }
  .type-input:focus { border-color:var(--accent); }
  .type-btn { padding:11px 16px; border-radius:11px; background:var(--accent); color:#fff; border:none; font-family:inherit; font-size:0.85rem; font-weight:700; cursor:pointer; white-space:nowrap; }
  .type-btn:active { opacity:0.8; }

  .opt-btn { display:flex; align-items:center; gap:10px; width:100%; padding:12px 13px; border-radius:11px; border:1.5px solid var(--border); background:rgba(255,255,255,0.03); color:var(--text); font-size:0.87rem; font-family:inherit; font-weight:400; text-align:left; cursor:pointer; line-height:1.5; word-break:keep-all; }
  .opt-btn:active:not(:disabled) { background:#1e3a5f; border-color:var(--accent); }
  .badge { flex-shrink:0; width:28px; height:28px; border-radius:50%; background:var(--border); display:flex; align-items:center; justify-content:center; font-size:0.8rem; font-weight:700; }
  .opt-btn.correct { border-color:var(--correct); background:rgba(63,185,80,0.1); }
  .opt-btn.correct .badge { background:var(--correct); color:#fff; }
  .opt-btn.wrong { border-color:var(--wrong); background:rgba(248,81,73,0.1); }
  .opt-btn.wrong .badge { background:var(--wrong); color:#fff; }
  .opt-btn:disabled { cursor:default; }

  .exp-box { display:none; margin-top:11px; padding:10px 13px; border-radius:10px; background:rgba(88,166,255,0.07); border-left:3px solid var(--accent); font-size:0.8rem; color:#79c0ff; line-height:1.65; word-break:keep-all; }
  .exp-box.show { display:block; animation:fadeIn 0.2s ease; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:none} }

  /* BOTTOM BAR */
  .bottom-bar { position:fixed; bottom:0; left:0; right:0; background:var(--card); border-top:1px solid var(--border); padding:10px 16px calc(var(--safe-bottom) + 10px); display:flex; gap:8px; z-index:200; }
  .btn-result { flex:1; padding:14px; border-radius:12px; background:var(--accent); color:#fff; border:none; font-family:inherit; font-size:0.9rem; font-weight:700; cursor:pointer; }
  .btn-result:active { opacity:0.8; }
  .btn-retry { padding:14px 16px; border-radius:12px; background:transparent; color:var(--muted); border:1.5px solid var(--border); font-family:inherit; font-size:0.85rem; font-weight:500; cursor:pointer; white-space:nowrap; }

  /* SCORE */
  .score-screen { display:flex; flex-direction:column; align-items:center; justify-content:center; padding:40px 20px 120px; text-align:center; min-height:60vh; }
  .score-ring { width:130px; height:130px; border-radius:50%; border:4px solid var(--accent); display:flex; flex-direction:column; align-items:center; justify-content:center; margin-bottom:22px; background:linear-gradient(135deg,#0d1f3c,#0d1117); box-shadow:0 0 40px rgba(88,166,255,0.2); }
  .score-big { font-size:2.2rem; font-weight:900; color:var(--accent2); line-height:1; }
  .score-of { font-size:0.7rem; color:var(--muted); margin-top:3px; }
  .score-emoji { font-size:1.8rem; margin-bottom:6px; }
  .score-title { font-size:1.1rem; font-weight:700; margin-bottom:6px; }
  .score-sub { font-size:0.82rem; color:var(--muted); }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <h1>🩺 의학용어 <span>퀴즈</span></h1>
    <div class="score-pill">✓ <span id="correctCount">0</span>개</div>
  </div>
  <div class="progress-wrap">
    <div class="progress-bar-bg"><div class="progress-bar" id="pbar"></div></div>
    <div class="progress-label" id="plabel">0 / 0</div>
  </div>
</div>

<div class="tabs-wrap" id="tabsWrap"></div>

<div style="flex-shrink:0; background:var(--bg); border-bottom:1px solid var(--border);">
  <div class="mode-toggle">
    <button class="mode-btn active" id="modeOX" onclick="setMode('choice')">🔤 객관식</button>
    <button class="mode-btn" id="modeType" onclick="setMode('type')">✏️ 단어 입력</button>
  </div>
</div>

<div class="scroll-area" id="scrollArea"></div>

<div class="bottom-bar">
  <button class="btn-retry" onclick="retry()">↺ 다시</button>
  <button class="btn-result" onclick="showScore()">결과 보기 →</button>
</div>

<script>
const allData = {
  "Ch.1 접미사·접두사": {
    questions: [
      // 접미사 의미
      { q:"-itis 의 의미는?", opts:["염증","통증","종양","절개"], ans:0, exp:"-itis = 염증 (예: Appendicitis 충수염, Arthritis 관절염)", tag:"접미사" },
      { q:"-ectomy 의 의미는?", opts:["절개","절제/제거","시각화","성형"], ans:1, exp:"-ectomy = 절제/제거 (예: Appendectomy 충수절제술, Gastrectomy 위절제술)", tag:"접미사" },
      { q:"-oma 의 의미는?", opts:["염증","통증","종양·살점","절개"], ans:2, exp:"-oma = 종양·살점 (예: Sarcoma 육종, Fibroma 섬유종)", tag:"접미사" },
      { q:"-pathy 의 의미는?", opts:["질병·장애","절개","통증","세포"], ans:0, exp:"-pathy = 질병·장애 (예: Arthropathy 관절병증, Neuropathy 신경병증)", tag:"접미사" },
      { q:"-plasty 의 의미는?", opts:["절제","파괴","성형·재건술","영사법"], ans:2, exp:"-plasty = 성형·재건술 (예: Rhinoplasty 코성형, Arthroplasty 관절성형술)", tag:"접미사" },
      { q:"-scopy 의 의미는?", opts:["내시경으로 살피는 것","절제술","이식","X선 촬영"], ans:0, exp:"-scopy = 내시경 검사 (예: Arthroscopy 관절경검사, Bronchoscopy 기관지경검사)", tag:"접미사" },
      { q:"-algia 의 의미는?", opts:["염증","통증","종양","마비"], ans:1, exp:"-algia = 통증 (예: Neuralgia 신경통, Arthralgia 관절통)", tag:"접미사" },
      { q:"-lysis 의 의미는?", opts:["결합","파괴·분리","성장","절개"], ans:1, exp:"-lysis = 파괴·분리 (예: Hemolysis 용혈, Paralysis 마비)", tag:"접미사" },
      { q:"-osis 의 의미는?", opts:["수술","상태·과정 (비정상적 상태)","통증","세포"], ans:1, exp:"-osis = 비정상적인 상태·과정 (예: Fibrosis 섬유증, Cyanosis 청색증)", tag:"접미사" },
      { q:"-megaly 의 의미는?", opts:["감소","축소","비대","절제"], ans:2, exp:"-megaly = 장기가 커진 상태 (예: Cardiomegaly 심장비대, Splenomegaly 비장비대)", tag:"접미사" },
      { q:"-dynia 의 의미는?", opts:["염증","통증","출혈","마비"], ans:1, exp:"-dynia = 통증 (-algia와 같은 의미, 예: Pleurodynia 흉막통)", tag:"접미사" },
      { q:"-rrhea 의 의미는?", opts:["파열","흐름·분비","통증","확장"], ans:1, exp:"-rrhea = 흐름·분비 (예: Diarrhea 설사, Rhinorrhea 콧물)", tag:"접미사" },
      { q:"-penia 의 의미는?", opts:["증가","감소·결핍","부종","경화"], ans:1, exp:"-penia = 감소·결핍 (예: Leukopenia 백혈구감소증, Thrombocytopenia 혈소판감소증)", tag:"접미사" },
      { q:"-stasis 의 의미는?", opts:["유동","정지·억제","증가","절제"], ans:1, exp:"-stasis = 정지·억제 (예: Hemostasis 지혈, Metastasis 전이)", tag:"접미사" },
      { q:"-poiesis 의 의미는?", opts:["조혈·생성","파괴","분리","절제"], ans:0, exp:"-poiesis = 조혈·생성 (예: Hematopoiesis 조혈, Erythropoiesis 적혈구생성)", tag:"접미사" },
      // 접두사 의미
      { q:"접두사 'intra-' 의 의미는?", opts:["바깥","사이","안에(내부)","위에"], ans:2, exp:"intra- = 안에 (예: Intravenous 정맥내, Intracranial 두개내)", tag:"접두사" },
      { q:"접두사 'extra-' 의 의미는?", opts:["안에","바깥(외부)","아래","사이에"], ans:1, exp:"extra- = 바깥 (예: Extracellular 세포외, Extrauterine 자궁외)", tag:"접두사" },
      { q:"접두사 'hyper-' 의 의미는?", opts:["정상이하","정상이상(과다)","없음","사이"], ans:1, exp:"hyper- = 과다·정상 이상 (예: Hypertension 고혈압, Hyperglycemia 고혈당)", tag:"접두사" },
      { q:"접두사 'hypo-' 의 의미는?", opts:["과다","정상이하(부족)","양쪽","위에"], ans:1, exp:"hypo- = 부족·정상 이하 (예: Hypoglycemia 저혈당, Hypothyroidism 갑상선기능저하증)", tag:"접두사" },
      { q:"접두사 'brady-' 의 의미는?", opts:["빠른","느린","없는","많은"], ans:1, exp:"brady- = 느린 (예: Bradycardia 서맥, Bradypnea 서호흡)", tag:"접두사" },
      { q:"접두사 'tachy-' 의 의미는?", opts:["느린","빠른","적은","위의"], ans:1, exp:"tachy- = 빠른 (예: Tachycardia 빈맥, Tachypnea 빈호흡)", tag:"접두사" },
      { q:"접두사 'sub-' 의 의미는?", opts:["위에","아래(아래에)","바깥","반대"], ans:1, exp:"sub- = 아래에 (예: Subcutaneous 피하, Sublingual 설하)", tag:"접두사" },
      { q:"접두사 'peri-' 의 의미는?", opts:["안에","주위에","위에","사이에"], ans:1, exp:"peri- = 주위에 (예: Pericardium 심장막, Periosteum 골막)", tag:"접두사" },
    ]
  },
  "Ch.2 방향·해부": {
    questions: [
      { q:"Superior / Cranial 의 한국어 의미는?", opts:["아래쪽/꼬리쪽","위쪽/머리쪽","앞쪽","뒤쪽"], ans:1, exp:"Superior/Cranial = 위쪽·머리쪽. 반대는 Inferior/Caudal(아래·꼬리쪽)", tag:"방향" },
      { q:"Anterior / Ventral 의 한국어 의미는?", opts:["앞쪽/배쪽","뒤쪽/등쪽","안쪽","바깥쪽"], ans:0, exp:"Anterior/Ventral = 앞쪽·배쪽. 반대는 Posterior/Dorsal(뒤쪽·등쪽)", tag:"방향" },
      { q:"Medial 의 한국어 의미는?", opts:["가쪽(바깥쪽)","안쪽(정중선쪽)","얕은","깊은"], ans:1, exp:"Medial = 안쪽 (정중선 방향). 반대는 Lateral(가쪽)", tag:"방향" },
      { q:"Proximal 의 한국어 의미는?", opts:["먼쪽","몸통에 가까운쪽","얕은","깊은"], ans:1, exp:"Proximal = 몸통에 가까운쪽. 반대는 Distal(먼쪽)", tag:"방향" },
      { q:"Supine 자세는?", opts:["엎드린 자세(복와위)","누운 자세(앙와위)","서있는 자세","옆으로 누운 자세"], ans:1, exp:"Supine = 바로 누운 자세(앙와위). 반대는 Prone(엎드린 자세, 복와위)", tag:"자세" },
      { q:"Right Upper Quadrant (RUQ)에 위치하는 주요 장기는?", opts:["비장(Spleen)","간(Liver)·담낭","맹장(Appendix)","S자결장"], ans:1, exp:"RUQ = 우상복부. 간(Liver), 담낭이 주로 위치. LUQ=비장, RLQ=맹장, LLQ=S결장", tag:"복부구역" },
      { q:"Sagittal plane (시상면)은?", opts:["몸을 위아래로 나누는 면","몸을 좌우로 나누는 면","몸을 앞뒤로 나누는 면","관절을 가로지르는 면"], ans:1, exp:"Sagittal(시상면) = 몸을 좌우로 나누는 면. Transverse=위아래, Frontal/Coronal=앞뒤", tag:"면" },
      { q:"Transverse / Horizontal plane은?", opts:["좌우로 나누는 면","몸을 위아래로 나누는 면","앞뒤로 나누는 면","대각선으로 나누는 면"], ans:1, exp:"Transverse(가로면) = 몸을 위쪽과 아래쪽으로 나누는 면", tag:"면" },
      { q:"Dorsum 의 의미는?", opts:["발바닥쪽","등·발등","손바닥쪽","무릎앞쪽"], ans:1, exp:"Dorsum = 등 또는 발등 쪽. 발바닥은 Plantar, 손바닥은 Palmar/Volar", tag:"방향" },
      { q:"Plantar 의 의미는?", opts:["발등","손등","발바닥","무릎아래"], ans:2, exp:"Plantar = 발바닥 쪽 (예: Plantar fasciitis 족저근막염)", tag:"방향" },
    ]
  },
  "Ch.3 피부계통": {
    questions: [
      { q:"Epidermis 의 한국어는?", opts:["진피","표피","피하조직","근막"], ans:1, exp:"Epidermis = 표피 (가장 바깥층). Dermis=진피, Hypodermis=피하조직", tag:"피부" },
      { q:"Hyperhidrosis 의 의미는?", opts:["땀 분비 감소","과도한 발한(땀 과다)","피부 건조증","피부 경화증"], ans:1, exp:"Hyper(과다)+hidr/o(땀)+osis(상태) = 과다발한증", tag:"피부질환" },
      { q:"Seborrhea 의 의미는?", opts:["코피","피지 과다분비","혈뇨","설사"], ans:1, exp:"Seb/o(피지)+rrhea(흐름) = 피지 과다분비·지루", tag:"피부질환" },

const chapters = Object.keys(allData);
let curCh = chapters[0];
let answered = {};
let correctCount = 0;
let quizMode = 'choice'; // 'choice' or 'type'

function buildTabs() {
  const wrap = document.getElementById('tabsWrap');
  chapters.forEach(ch => {
    const btn = document.createElement('button');
    btn.className = 'tab-btn' + (ch === curCh ? ' active' : '');
    btn.textContent = ch;
    btn.onclick = () => switchChapter(ch);
    wrap.appendChild(btn);
  });
}

function setMode(m) {
  quizMode = m;
  document.getElementById('modeOX').classList.toggle('active', m === 'choice');
  document.getElementById('modeType').classList.toggle('active', m === 'type');
  answered = {}; correctCount = 0;
  document.getElementById('correctCount').textContent = '0';
  render();
}

function switchChapter(ch) {
  curCh = ch;
  answered = {}; correctCount = 0;
  document.getElementById('correctCount').textContent = '0';
  document.querySelectorAll('.tab-btn').forEach((b,i) => {
    b.classList.toggle('active', chapters[i] === ch);
    if (chapters[i] === ch) b.scrollIntoView({ behavior:'smooth', block:'nearest', inline:'center' });
  });
  render();
}

function render() {
  const area = document.getElementById('scrollArea');
  area.scrollTop = 0;
  area.innerHTML = '';
  const qs = allData[curCh].questions;
  qs.forEach((q, qi) => {
    const card = document.createElement('div');
    card.className = 'q-card';
    const isType = quizMode === 'type';
    card.innerHTML = `
      <div class="q-meta">
        <span>${curCh} · ${qi+1}/${qs.length}</span>
        <span class="q-tag">${q.tag}</span>
      </div>
      <div class="q-text">${q.q}</div>
      ${isType ? `
        <div class="q-hint">💡 정답을 직접 입력하세요</div>
        <div class="type-wrap">
          <input class="type-input" id="ti${qi}" placeholder="정답 입력..." 
            onkeydown="if(event.key==='Enter')checkType(${qi})" />
          <button class="type-btn" onclick="checkType(${qi})">확인</button>
        </div>
      ` : `
        <div class="options">
          ${q.opts.map((o,oi)=>`
            <button class="opt-btn" ontouchstart="" onclick="pick(${qi},${oi})" id="o${qi}_${oi}">
              <span class="badge">${['①','②','③','④'][oi]}</span>
              <span>${o}</span>
            </button>`).join('')}
        </div>
      `}
      <div class="exp-box" id="exp${qi}">${q.exp}</div>`;
    area.appendChild(card);
  });
  updateProgress();
}

function pick(qi, sel) {
  if (answered[qi] !== undefined) return;
  answered[qi] = sel;
  const q = allData[curCh].questions[qi];
  if (sel === q.ans) { correctCount++; document.getElementById('correctCount').textContent = correctCount; }
  q.opts.forEach((_,oi) => {
    const btn = document.getElementById(`o${qi}_${oi}`);
    btn.disabled = true;
    if (oi === q.ans) btn.classList.add('correct');
    else if (oi === sel) btn.classList.add('wrong');
  });
  document.getElementById(`exp${qi}`).classList.add('show');
  updateProgress();
}

function checkType(qi) {
  if (answered[qi] !== undefined) return;
  const q = allData[curCh].questions[qi];
  const input = document.getElementById(`ti${qi}`);
  const val = input.value.trim();
  if (!val) return;
  const correct = q.opts[q.ans];
  const isOk = val === correct || val.replace(/\s/g,'') === correct.replace(/\s/g,'') ||
    correct.includes(val) || val.includes(correct.split('(')[0].trim());
  answered[qi] = isOk ? q.ans : -1;
  input.disabled = true;
  input.style.borderColor = isOk ? 'var(--correct)' : 'var(--wrong)';
  input.style.background = isOk ? 'rgba(63,185,80,0.1)' : 'rgba(248,81,73,0.1)';
  if (isOk) { correctCount++; document.getElementById('correctCount').textContent = correctCount; }
  else {
    const hint = document.createElement('div');
    hint.style.cssText = 'margin-top:6px;font-size:0.8rem;color:var(--correct);';
    hint.textContent = `✅ 정답: ${correct}`;
    input.parentNode.after(hint);
  }
  document.getElementById(`exp${qi}`).classList.add('show');
  updateProgress();
}

function updateProgress() {
  const total = allData[curCh].questions.length;
  const done = Object.keys(answered).length;
  document.getElementById('pbar').style.width = (done/total*100) + '%';
  document.getElementById('plabel').textContent = `${done} / ${total}`;
}

function retry() {
  answered = {}; correctCount = 0;
  document.getElementById('correctCount').textContent = '0';
  render();
}

function showScore() {
  const total = allData[curCh].questions.length;
  const pct = Math.round(correctCount/total*100);
  const [emoji,msg] = pct>=90?['🎉','완벽합니다!']:pct>=70?['👍','잘했어요!']:pct>=50?['📚','조금 더 공부해봐요']:['💪','다시 도전해봐요!'];
  document.getElementById('scrollArea').innerHTML = `
    <div class="score-screen">
      <div class="score-ring">
        <div class="score-big">${correctCount}/${total}</div>
        <div class="score-of">정답</div>
      </div>
      <div class="score-emoji">${emoji}</div>
      <div class="score-title">${msg}</div>
      <div class="score-sub">정답률 ${pct}% · ${curCh}</div>
    </div>`;
}

buildTabs();
render();
</script>
</body>
</html>
